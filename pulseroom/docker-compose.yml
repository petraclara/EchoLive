services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pulseroom
      POSTGRES_PASSWORD: pulseroom
      POSTGRES_DB: pulseroom
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulseroom"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://pulseroom:pulseroom@postgres:5432/pulseroom?sslmode=disable
      JWT_SECRET: dev-secret-change-in-production
      CORS_ORIGIN: http://localhost:3000
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
